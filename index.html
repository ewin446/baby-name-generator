  <script>
    // ============================================
    // 宝宝状态和生日修改逻辑
    // ============================================

    // 初始化：读取修改次数和状态
    function initBabyStatusLogic() {
      const babyStatusSelect = document.getElementById('babyStatus');
      const birthDateInput = document.getElementById('birthDate');
      const birthDateTip = document.getElementById('birthDateTip');

      // 读取localStorage中的修改次数（默认0次）
      const modifyCount = parseInt(localStorage.getItem('birthDateModifyCount') || '0');
      const currentStatus = localStorage.getItem('babyStatus') || 'born';

      // 恢复之前选择的状态
      babyStatusSelect.value = currentStatus;
      birthDateInput.value = localStorage.getItem('birthDate') || '';

      // 根据状态和修改次数控制输入框
      updateBirthDateState(currentStatus, modifyCount);

      // 监听状态变化
      babyStatusSelect.addEventListener('change', function() {
        const newStatus = this.value;
        localStorage.setItem('babyStatus', newStatus);

        // 如果从未出生切换到已出生，重置修改次数为0
        if (newStatus === 'born' && currentStatus === 'unborn') {
          localStorage.setItem('birthDateModifyCount', '0');
          updateBirthDateState(newStatus, 0);
        } else {
          updateBirthDateState(newStatus, modifyCount);
        }
      });

      // 监听生日输入框的变化（记录修改次数）
      birthDateInput.addEventListener('change', function() {
        handleBirthDateChange(this.value);
      });
    }

    // 处理生日修改
    function handleBirthDateChange(newValue) {
      const babyStatusSelect = document.getElementById('babyStatus');
      const currentStatus = babyStatusSelect.value;
      const birthDateInput = document.getElementById('birthDate');
      const birthDateTip = document.getElementById('birthDateTip');

      // 未出生状态不限制修改
      if (currentStatus === 'unborn') {
        localStorage.setItem('birthDate', newValue);
        return;
      }

      // 已出生状态，检查修改次数
      let modifyCount = parseInt(localStorage.getItem('birthDateModifyCount') || '0');
      const oldBirthDate = localStorage.getItem('birthDate') || '';

      // 如果新值与旧值相同，不算修改
      if (newValue === oldBirthDate) {
        return;
      }

      // 如果是首次设置（之前为空），不算修改
      if (!oldBirthDate) {
        localStorage.setItem('birthDate', newValue);
        updateBirthDateState(currentStatus, modifyCount);
        return;
      }

      // 检查修改次数
      if (modifyCount >= 1) {
        // 超过修改次数限制
        alert('温馨提示：已出生宝宝的生日仅可修改1次，您已用完修改机会。如需再次修改，请联系客服处理。');
        // 恢复为旧值
        birthDateInput.value = oldBirthDate;
        return;
      }

      // 记录修改
      modifyCount++;
      localStorage.setItem('birthDateModifyCount', modifyCount.toString());
      localStorage.setItem('birthDate', newValue);

      // 更新状态
      updateBirthDateState(currentStatus, modifyCount);

      // 提示用户
      if (modifyCount >= 1) {
        alert('生日修改成功！已用完1次修改机会，生日输入框将锁定。');
      }
    }

    // 更新生日输入框状态
    function updateBirthDateState(babyStatus, modifyCount) {
      const birthDateInput = document.getElementById('birthDate');
      const birthDateTip = document.getElementById('birthDateTip');

      if (babyStatus === 'unborn') {
        // 未出生：不限制修改
        birthDateInput.disabled = false;
        birthDateTip.style.display = 'none';
      } else {
        // 已出生：根据修改次数控制
        if (modifyCount >= 1) {
          // 已用完1次修改机会
          birthDateInput.disabled = true;
          birthDateTip.style.display = 'block';
          birthDateTip.textContent = '⚠️ 已用完1次修改机会，生日已锁定';
          birthDateTip.style.color = '#ff2442';
        } else {
          // 还可以修改1次
          birthDateInput.disabled = false;
          birthDateTip.style.display = 'block';
          birthDateTip.textContent = '✓ 已出生宝宝可修改1次生日';
          birthDateTip.style.color = '#999';
        }
      }
    }

          { name: "星柔", source: "《楚辞》", meaning: "星辰温柔，柔情似水；如星辰般温柔，柔情似水。" },
          { name: "梦华", source: "《诗经》", meaning: "梦中繁华，美好如画；如梦中的繁华般美好。" },
          { name: "星宇", source: "《楚辞》", meaning: "星辰宇宙，浩瀚无垠；如星辰般闪耀，胸怀宇宙。" },
          { name: "梦河", source: "《诗经》", meaning: "梦中星河，浩瀚无垠；如梦中的星河般浩瀚。" },
          { name: "星华", source: "《楚辞》", meaning: "星辰光华，灿烂辉煌；如星辰般闪耀，光芒四射。" },
          { name: "月华", source: "《诗经》", meaning: "月华如练，皎洁美好；如月光般皎洁美好。" },
          { name: "星远", source: "《楚辞》", meaning: "星辰遥远，志向高远；如星辰般遥远，志向高远。" }
        ]
      }
    };

    // 3. 生成名字（根据日期和姓氏动态匹配）
    function generateNames() {
      const surname = document.getElementById("surname").value.trim();
      const gender = document.getElementById("gender").value;
      const style = document.getElementById("style").value;
      const birthDate = document.getElementById("birthDate").value;

      if (!surname) {
        alert("请输入宝宝姓氏～");
        return;
      }

      // 获取对应性别和风格的名字库
      let filteredNames = [...nameDatabase[gender][style]];
      
      // 根据出生日期排序和打分（不做过滤）
      filteredNames = sortAndScoreNamesByDate(filteredNames, birthDate);
      
      // 确保至少显示8个名字，如果不够就从其他风格补充
      if (filteredNames.length < 8) {
        const otherStyles = Object.keys(nameDatabase[gender]).filter(s => s !== style);
        for (const otherStyle of otherStyles) {
          if (filteredNames.length >= 8) break;
          const additionalNames = nameDatabase[gender][otherStyle];
          const scored = sortAndScoreNamesByDate([...additionalNames], birthDate);
          filteredNames = [...filteredNames, ...scored];
        }
      }

      const nameList = document.getElementById("nameList");
      nameList.innerHTML = "";

      // 生成带评分的名字卡片（90-98分，分数也会根据日期变化）
      filteredNames.forEach(nameData => {
        // 根据日期和姓氏生成一致的分数
        const score = generateConsistentScore(nameData.name, surname, birthDate);
        const nameCard = document.createElement("div");
        nameCard.className = "name-card";
        nameCard.innerHTML = `
          <div class="card-header">
            <span class="name-text">${surname}${nameData.name}</span>
            <div style="display: flex; align-items: center; gap: 6px;">
              <span class="score-tag">${score}分</span>
            </div>
          </div>
          <div class="source-tag">${nameData.source}</div>
          <div class="meaning-area">
            <div class="meaning-text">${nameData.meaning}</div>
          </div>
          <button class="collect-btn" onclick="collectName(this)">♡</button>
        `;
        nameList.appendChild(nameCard);
      });

      // 显示结果区
      document.getElementById("resultArea").style.display = "block";
    }

    // 根据出生日期排序和打分名字（不做过滤，确保显示所有名字）
    function sortAndScoreNamesByDate(names, birthDate) {
      if (!birthDate) {
        return shuffleArray([...names]);
      }

      const date = new Date(birthDate);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const year = date.getFullYear();
      
      // 根据生肖
      const zodiac = getZodiac(year);
      // 根据季节
      const season = getSeason(month);
      // 根据五行（简化版）
      const element = getElement(month, day);

      // 给每个名字打分（只是排序依据，不做过滤）
      const scoredNames = names.map(nameData => {
        let score = 0;
        
        // 根据来源匹配加分
        if (nameData.source.includes(zodiac)) score += 3;
        if (nameData.meaning.includes(getSeasonKeyword(season))) score += 2;
        if (nameData.meaning.includes(getElementKeyword(element))) score += 2;
        
        // 根据名字汉字含义匹配
        if (nameData.meaning.includes("雨") && season === "spring") score += 2;
        if (nameData.meaning.includes("雪") && season === "winter") score += 2;
        if (nameData.meaning.includes("月") && (day >= 15)) score += 1;
        
        return { ...nameData, matchScore: score };
      });

      // 按分数排序（高分优先），分数相同的随机
      scoredNames.sort((a, b) => b.matchScore - a.matchScore);
      
      return scoredNames;
    }

    // 生成一致的分数（同一天同一个名字分数相同）
    function generateConsistentScore(nameStr, surname, birthDate) {
      if (!birthDate) return Math.floor(Math.random() * 9) + 90;
      
      const date = new Date(birthDate);
      const seed = date.getMonth() * 10000 + date.getDate() * 100 + date.getFullYear();
      const nameSum = (nameStr + surname).split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
      
      const baseScore = 90 + (seed % 6) + (nameSum % 3);
      return Math.min(baseScore, 98);
    }

    // 获取生肖
    function getZodiac(year) {
      const zodiacs = ["鼠", "牛", "虎", "兔", "龙", "蛇", "马", "羊", "猴", "鸡", "狗", "猪"];
      return zodiacs[(year - 4) % 12];
    }

    // 获取季节
    function getSeason(month) {
      if (month >= 3 && month <= 5) return "spring";
      if (month >= 6 && month <= 8) return "summer";
      if (month >= 9 && month <= 11) return "autumn";
      return "winter";
    }

    // 获取季节关键词
    function getSeasonKeyword(season) {
      const keywords = {
        spring: ["春", "雨", "芽", "生", "花"],
        summer: ["夏", "阳", "热", "盛", "茂"],
        autumn: ["秋", "金", "风", "收", "硕"],
        winter: ["冬", "雪", "寒", "梅", "白"]
      };
      return keywords[season].join("|");
    }

    // 获取五行（简化版）
    function getElement(month, day) {
      if ((month === 3 && day >= 21) || (month === 4) || (month === 5 && day <= 20)) return "wood";
      if ((month === 5 && day >= 21) || (month === 6) || (month === 7 && day <= 22)) return "fire";
      if ((month === 7 && day >= 23) || (month === 8) || (month === 9 && day <= 22)) return "earth";
      if ((month === 9 && day >= 23) || (month === 10) || (month === 11 && day <= 21)) return "gold";
      return "water";
    }

    // 获取五行关键词
    function getElementKeyword(element) {
      const keywords = {
        wood: ["木", "林", "森", "树", "青"],
        fire: ["火", "阳", "红", "热", "明"],
        earth: ["土", "山", "石", "地", "黄"],
        gold: ["金", "玉", "宝", "珍", "白"],
        water: ["水", "雨", "雪", "冰", "蓝"]
      };
      return keywords[element].join("|");
    }

    // 根据种子打乱数组
    function shuffleBySeed(array, seed) {
      const result = [...array];
      const random = sfc32(seed);
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    // 简单的伪随机数生成器
    function sfc32(a) {
      return function() {
        a |= 0;
        a = a + 0x9E3779B9 | 0;
        let t = a ^ a >>> 16;
        t = Math.imul(t, 0x21F0AAAD);
        t = t ^ t >>> 15;
        t = Math.imul(t, 0x735A2D97);
        return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
      };
    }

    // 普通随机打乱
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // 4. 收藏功能
    let favorites = [];

    function collectName(btn) {
      const card = btn.closest('.name-card');
      const nameText = card.querySelector('.name-text').textContent;
      const source = card.querySelector('.source-tag').textContent;
      const meaning = card.querySelector('.meaning-text').textContent;
      const score = card.querySelector('.score-tag').textContent;

      btn.classList.toggle("collected");

      if (btn.classList.contains("collected")) {
        btn.innerHTML = "❤";
        // 添加到收藏
        if (!favorites.some(f => f.name === nameText)) {
          favorites.push({ name: nameText, source, meaning, score });
        }
      } else {
        btn.innerHTML = "♡";
        // 从收藏中移除
        favorites = favorites.filter(f => f.name !== nameText);
      }

      renderFavorites();
    }

    // 渲染收藏列表
    function renderFavorites() {
      const favoritesList = document.getElementById("favoritesList");
      const favoritesCount = document.getElementById("favoritesCount");
      const favoritesArea = document.getElementById("favoritesArea");

      favoritesCount.textContent = `已收藏 ${favorites.length} 个名字`;

      if (favorites.length === 0) {
        favoritesArea.classList.remove("show");
        return;
      }

      favoritesArea.classList.add("show");
      favoritesList.innerHTML = "";

      favorites.forEach(item => {
        const favCard = document.createElement("div");
        favCard.className = "name-card";
        favCard.innerHTML = `
          <div class="card-header">
            <span class="name-text">${item.name}</span>
            <div style="display: flex; align-items: center; gap: 6px;">
              <span class="score-tag">${item.score}</span>
            </div>
          </div>
          <div class="source-tag">${item.source}</div>
          <div class="meaning-area">
            <div class="meaning-text">${item.meaning}</div>
          </div>
          <button class="delete-btn" onclick="removeFavorite('${item.name}')">删除</button>
        `;
        favoritesList.appendChild(favCard);
      });
    }

    // 删除收藏
    function removeFavorite(name) {
      favorites = favorites.filter(f => f.name !== name);
      renderFavorites();
      
      // 更新主列表中的收藏状态
      const mainListCards = document.querySelectorAll('#nameList .name-card');
      mainListCards.forEach(card => {
        const nameText = card.querySelector('.name-text').textContent;
        if (nameText === name) {
          const btn = card.querySelector('.collect-btn');
          btn.classList.remove("collected");
          btn.innerHTML = "♡";
        }
      });
    }
  </script>
