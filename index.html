<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI - 精准人格测试</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <!-- 主页 -->
    <main class="main-page" id="mainPage">
        <div class="hero">
            <div class="hero-badge">🔥 全新人格测试</div>
            <h1 class="glitch" data-text="MBTI已经过时，SBTI来了。">MBTI已经过时，SBTI来了。</h1>
            <p class="subtitle">
                <span class="highlight">31道题</span>，
                <span class="highlight">15个维度</span>，
                <span class="highlight">27种人格</span>。
            </p>
            <p class="description">找到属于你的那个精准人格画像。</p>
            <button class="cta-button" id="startTest">
                <span>开始测试</span>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <!-- 功能模块 -->
        <section class="features">
            <div class="feature-card" data-delay="0">
                <div class="feature-icon">
                    <span class="icon-text">15</span>
                </div>
                <h3>维度分析</h3>
                <p>自我 · 情感 · 态度 · 行动 · 社交</p>
            </div>
            <div class="feature-card" data-delay="1">
                <div class="feature-icon">
                    <span class="icon-text">27</span>
                </div>
                <h3>种人格</h3>
                <p>包含隐藏人格和彩蛋</p>
            </div>
            <div class="feature-card" data-delay="2">
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/>
                        <circle cx="6" cy="12" r="3"/>
                        <circle cx="18" cy="19" r="3"/>
                        <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/>
                    </svg>
                </div>
                <h3>一键分享</h3>
                <p>生成专属结果链接</p>
            </div>
        </section>

        <!-- 27种人格展示 -->
        <section class="personalities-section">
            <h2 class="section-title">
                <span class="title-accent">27</span> 种人格一览
            </h2>
            <div class="personality-grid" id="personalityGrid"></div>
        </section>
    </main>

    <!-- 测试页面 -->
    <div class="test-page hidden" id="testPage">
        <div class="test-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter">
                <span id="currentQ">1</span> / <span id="totalQ">31</span>
            </div>
            
            <div class="question-card" id="questionCard">
                <h2 class="question-text" id="questionText"></h2>
                <div class="options" id="optionsContainer"></div>
            </div>

            <div class="nav-buttons">
                <button class="nav-btn prev-btn" id="prevBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    上一题
                </button>
                <button class="nav-btn next-btn" id="nextBtn" disabled>
                    下一题
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 结果页面 -->
    <div class="result-page hidden" id="resultPage">
        <div class="result-container">
            <div class="result-header">
                <p class="result-label">你的SBTI人格是</p>
                <h1 class="result-type" id="resultType"></h1>
                <div class="result-badge" id="resultBadge"></div>
            </div>
            
            <div class="result-content">
                <div class="result-description" id="resultDescription"></div>
                
                <div class="dimension-analysis">
                    <h3>📊 维度分析</h3>
                    <div class="dimensions-grid" id="dimensionsGrid"></div>
                </div>

                <div class="share-section">
                    <h3>🔗 分享你的结果</h3>
                    <div class="share-buttons">
                        <button class="share-btn copy-btn" id="copyLink">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                            </svg>
                            复制链接
                        </button>
                        <button class="share-btn twitter-btn" id="shareTwitter">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            Twitter
                        </button>
                        <button class="share-btn weibo-btn" id="shareWeibo">
                            <span class="weibo-icon">微博</span>
                        </button>
                    </div>
                    <div class="share-link-display">
                        <input type="text" id="shareLink" readonly>
                        <span class="copy-feedback" id="copyFeedback">已复制!</span>
                    </div>
                </div>

                <button class="restart-btn" id="restartTest">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                    </svg>
                    重新测试
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
