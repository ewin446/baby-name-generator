<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝宝取名测试版（带评分筛选）</title>
  <style>
    body { padding: 20px; font-family: Arial; }
    .box { max-width: 500px; margin: 0 auto; }
    input, select { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
    button { padding: 10px; border: none; cursor: pointer; color: white; }
    .generate-btn { width: 100%; background: green; margin: 10px 0; }
    .filter-btn { 
      width: 31%; 
      margin: 10px 1%; 
      background: #666; 
      border-radius: 4px;
    }
    .filter-btn.active { background: #007bff; } /* 激活状态样式 */
    #result { 
      margin-top: 20px; 
      padding: 10px; 
      border: 1px solid #ccc; 
      display: none;
    }
    .name-item { padding: 8px 0; border-bottom: 1px dashed #eee; }
  </style>
</head>
<body>
  <div class="box">
    <h2>宝宝取名测试（带评分筛选）</h2>
    姓氏：<input type="text" id="surname" placeholder="输入李/王等">
    性别：<select id="gender">
      <option value="girl">女宝</option>
      <option value="boy">男宝</option>
    </select>
    <button class="generate-btn" onclick="testAndGenerate()">点击生成名字</button>

    <!-- 新增：评分筛选按钮区域 -->
    <div class="filter-area" id="filterArea" style="display: none;">
      <span>评分筛选：</span>
      <button class="filter-btn active" onclick="filterByNameScore('all', this)">全部</button>
      <button class="filter-btn" onclick="filterByNameScore('95-99', this)">95-99分</button>
      <button class="filter-btn" onclick="filterByNameScore('90-94', this)">90-94分</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    // 全局变量：保存所有生成的名字（含评分），用于筛选
    let allGeneratedNames = [];

    // 第一步：先验证按钮点击是否生效（弹窗提示）
    function testAndGenerate() {
      alert('按钮点击生效！开始生成名字...'); // 先弹这个，证明按钮能触发
      
      // 第二步：获取输入值
      const surname = document.getElementById('surname').value.trim();
      if (!surname) {
        alert('请输入姓氏！');
        return;
      }

      // 第三步：名字数据（新增评分字段，90-99随机）
      let rawNames = [];
      if (document.getElementById('gender').value === 'girl') {
        rawNames = [
          { name: '婉清', score: 98 },
          { name: '静姝', score: 97 },
          { name: '一诺', score: 93 },
          { name: '语桐', score: 92 },
          { name: '梓萱', score: 96 }
        ];
      } else {
        rawNames = [
          { name: '子谦', score: 99 },
          { name: '修远', score: 94 },
          { name: '浩然', score: 95 },
          { name: '宇辰', score: 91 },
          { name: '泽宇', score: 97 }
        ];
      }

      // 拼接姓氏，保存到全局变量（用于筛选）
      allGeneratedNames = rawNames.map(item => ({
        fullName: surname + item.name,
        score: item.score
      }));

      // 第四步：显示筛选区域 + 渲染全部名字
      document.getElementById('filterArea').style.display = 'block';
      renderNameList(allGeneratedNames);
      alert('名字生成完成！可使用评分筛选');
    }

    // 新增：渲染名字列表（抽离成函数，方便筛选后复用）
    function renderNameList(nameList) {
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      
      let html = '';
      nameList.forEach(item => {
        html += `<div class="name-item">${item.fullName}（${item.score}分）</div>`;
      });
      resultDiv.innerHTML = html;
    }

    // 新增：评分筛选核心逻辑
    function filterByNameScore(range, btn) {
      // 1. 切换按钮激活状态
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // 2. 根据区间筛选名字
      let filteredNames = [];
      if (range === 'all') {
        filteredNames = allGeneratedNames; // 全部
      } else if (range === '95-99') {
        filteredNames = allGeneratedNames.filter(item => item.score >= 95 && item.score <= 99);
      } else if (range === '90-94') {
        filteredNames = allGeneratedNames.filter(item => item.score >= 90 && item.score <= 94);
      }

      // 3. 重新渲染筛选后的列表
      renderNameList(filteredNames);
    }
  </script>
</body>
</html>
