    // 设置生成数量
    function setCount(c, btn) {
      count = c;
      document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      toast(`已选择生成${c}个名字`);
    }

    // 随机打乱
    function shuffle(arr) {
      let newArr = [...arr];
      for(let i=newArr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [newArr[i],newArr[j]]=[newArr[j],newArr[i]];
      }
      return newArr;
    }

    // 生成名字
    function generate() {
      const surname = document.getElementById('surname').value.trim();
      const gender = document.getElementById('gender').value;
      const style = document.getElementById('style').value;
      if (!surname) { toast("请输入姓氏"); return; }

      const list = document.getElementById('list');
      list.innerHTML = '';
      document.getElementById('result').style.display = 'block';

      let allNames = [];
      if(style === 'classical'){
        allNames = [...nameLibrary[gender].classical];
      }else if(style === 'poetic'){
        allNames = [...nameLibrary[gender].poetic];
      }else{
        allNames = [...nameLibrary[gender].modern];
      }
      
      allNames = shuffle([...allNames, ...allNames, ...allNames]);
      const names = allNames.slice(0, count);

      names.forEach(item => {
        const card = document.createElement('div');
        card.className = 'name-card';
        card.innerHTML = `
          <div class="card-header">
            <span class="name-text">${surname}${item.n}</span>
            <span class="score-tag">96分</span>
          </div>
          <div class="source-tag">出自：${item.s}</div>
          <div class="meaning-area">${item.m}</div>
          <button class="collect-btn" onclick="collect(this, '${surname}${item.n}')">♡</button>
        `;
        list.appendChild(card);
      });
      toast("生成完成！500+名字库已启用");
    }

    // 收藏功能
    function collect(btn, name) {
      if (btn.classList.contains('collected')) {
        btn.classList.remove('collected');
        btn.textContent = '♡';
        toast(`已取消收藏 ${name}`);
      } else {
        btn.classList.add('collected');
        btn.textContent = '♥';
        toast(`已收藏 ${name}`);
      }
    }

    // 提示框
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
